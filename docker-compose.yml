version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-quest-app
    ports:
      - "${DOCKER_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
    driver: local
